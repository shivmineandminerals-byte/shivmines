<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google-site-verification" content="HWqXCtUX7tu2AC6RIb-8Q_CtezvnTfNlumLT0cMa4pA" />
    <meta name="author" content="Shiv Mines and Minerals" />

    <!--
      Per-page SEO tags (title, description, canonical, robots, hreflang, Open Graph,
      Twitter, geo, JSON-LD) are set per route via SEOHead / react-helmet-async and
      are pre-rendered into each page's static HTML by vite-react-ssg.
      Only truly global tags live here so there are no duplicate title/canonical/og tags.
    -->

    <!-- Theme & Appearance -->
    <meta name="theme-color" content="#111111" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Preload only the first (LCP) hero slide; slides 2 & 3 load after -->
    <link rel="preload" href="/images/2.webp" as="image" type="image/webp" fetchpriority="high" />

    <!-- Fonts (matched to tailwind.config.js) — display=swap avoids invisible text / layout shift -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Libre+Baskerville:wght@400;700&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Libre+Baskerville:wght@400;700&display=swap" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Libre+Baskerville:wght@400;700&display=swap" /></noscript>

    <!--
      Global connected schema graph (Organization + WebSite + LocalBusiness), @id-linked,
      appears on every page for a consistent brand entity.
      TODO(owner): confirm the sameAs social profile URLs below are your real accounts,
      or replace/remove them — do not leave profiles that aren't yours.
    -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://shivmines.in/#organization",
          "name": "Shiv Mines and Minerals",
          "alternateName": "Shiv Minerals",
          "url": "https://shivmines.in",
          "logo": {
            "@type": "ImageObject",
            "@id": "https://shivmines.in/#logo",
            "url": "https://shivmines.in/logo.png",
            "width": 512,
            "height": 512
          },
          "image": { "@id": "https://shivmines.in/#logo" },
          "description": "Silica sand mining company in Karauli, Rajasthan since 2006 — construction, industrial, glass, foundry, frac and custom-grade silica sand and silica powder for domestic supply and export.",
          "foundingDate": "2006",
          "email": "shivmineandminerals@gmail.com",
          "telephone": "+91-9116758641",
          "address": {
            "@type": "PostalAddress",
            "streetAddress": "Mining Lease M.L.No. 34/2006, Near Village - Raghuvanshi",
            "addressLocality": "Karauli",
            "addressRegion": "Rajasthan",
            "postalCode": "322241",
            "addressCountry": "IN"
          },
          "contactPoint": {
            "@type": "ContactPoint",
            "telephone": "+91-9116758641",
            "email": "shivmineandminerals@gmail.com",
            "contactType": "sales",
            "areaServed": ["IN", "Worldwide"],
            "availableLanguage": ["English", "Hindi"]
          },
          "areaServed": ["India", "Rajasthan", "Worldwide"],
          "knowsAbout": ["Silica Sand Mining", "Silica Sand Processing", "Silica Powder", "Construction Sand", "Industrial Sand", "Glass Sand", "Foundry Sand", "Frac Sand"],
          "sameAs": [
            "https://linkedin.com/company/shivminerals",
            "https://twitter.com/ShivMinerals",
            "https://facebook.com/ShivMinerals",
            "https://youtube.com/@ShivMinerals"
          ]
        },
        {
          "@type": "WebSite",
          "@id": "https://shivmines.in/#website",
          "url": "https://shivmines.in",
          "name": "Shiv Mines and Minerals",
          "publisher": { "@id": "https://shivmines.in/#organization" },
          "inLanguage": "en",
          "potentialAction": {
            "@type": "SearchAction",
            "target": "https://shivmines.in/products?q={search_term_string}",
            "query-input": "required name=search_term_string"
          }
        },
        {
          "@type": "LocalBusiness",
          "@id": "https://shivmines.in/#localbusiness",
          "name": "Shiv Mines and Minerals",
          "alternateName": "Shiv Minerals Karauli",
          "parentOrganization": { "@id": "https://shivmines.in/#organization" },
          "url": "https://shivmines.in",
          "image": "https://shivmines.in/images/hero-quarry.jpg",
          "logo": { "@id": "https://shivmines.in/#logo" },
          "telephone": "+91-9116758641",
          "email": "shivmineandminerals@gmail.com",
          "description": "Silica sand mining and processing company in Karauli, Rajasthan. Construction, industrial, glass, foundry, frac and custom-grade silica sand and silica powder for domestic supply and export.",
          "address": {
            "@type": "PostalAddress",
            "streetAddress": "Mining Lease M.L.No. 34/2006, Near Village - Raghuvanshi",
            "addressLocality": "Karauli",
            "addressRegion": "Rajasthan",
            "postalCode": "322241",
            "addressCountry": "IN"
          },
          "geo": { "@type": "GeoCoordinates", "latitude": 26.5, "longitude": 76.85 },
          "hasMap": "https://www.google.com/maps/place/Karauli,+Rajasthan",
          "openingHours": "Mo-Sa 09:00-18:00",
          "areaServed": ["Rajasthan", "India", "Worldwide"]
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
